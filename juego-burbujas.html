<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Explota el número correcto</title>
    <link rel="stylesheet" href="./Styles/juego-burbujas.css" />
</head>

<body>
    <main class="game">
        <img src="./imagenes/fondobackground.png" class="bg" alt="Fondo" />

        <section class="content">
            <a href="juegos.html" class="back">‹</a>

            <div class="header">
                <img src="./imagenes/burbujas.png" alt="Explota la burbuja" class="header-img" />
            </div>

            <div class="score-box">
                ⭐ Puntaje: <span id="score">0</span>
            </div>

            <div class="question-card">
                <p>¿Cuánto es?</p>
                <h2 id="question">2 × 3</h2>
            </div>

            <div class="bubbles" id="bubbles"></div>

            <p class="message" id="message">Toca una burbuja 😊</p>

            <button class="next-btn" id="nextBtn">Siguiente</button>
        </section>
    </main>
    <audio id="popSound" src="./imagenes/sonidos/pop.mp3"></audio>
    <audio id="wrongSound" src="./imagenes/sonidos/wrong.mp3"></audio>

    <script src="./js/juego-burbujas.js"></script>
</body>

</html>
