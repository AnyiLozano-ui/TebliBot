<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TabliBot</title>

    <link rel="stylesheet" href="menu.css" />
</head>

<body>
    <div class="app">
        <img src="./imagenes/fondomenu.png" class="bg-img" alt="Fondo" />

        <a href="index.html" class="home-btn">🏠 Inicio</a>

        <div class="top-section">
            <img src="./imagenes/aprende.png" class="banner" alt="Aprende" />
        </div>

        <div class="cards">
            <!-- JUEGA -->
            <div class="card green">
                <div class="icon-circle">
                    <img src="./imagenes/control.png" alt="" />
                </div>

                <div class="card-text">
                    <h2>Juega</h2>
                    <p>Diviértete y descubre las tablas</p>
                </div>

                <div class="arrow">›</div>
            </div>

            <!-- PRACTICA -->
            <a href="profesora.html" class="card-link">
                <div class="card blue">
                    <div class="icon-circle">
                        <img src="./imagenes/practic.png" alt="" />
                    </div>

                    <div class="card-text">
                        <h2>Practica</h2>
                        <p>Ejercicios para mejorar cada día</p>
                    </div>

                    <div class="arrow">›</div>
                </div>
            </a>

            <!-- DESAFIOS -->
            <div class="card orange">
                <div class="icon-circle">
                    <img src="./imagenes/bombill.png" alt="" />
                </div>

                <div class="card-text">
                    <h2>Desafíos</h2>
                    <p>Desafíate con retos</p>
                </div>

                <div class="arrow">›</div>
            </div>

            <!-- MATERIAL -->
            <div class="card purple">
                <div class="icon-circle">
                    <img src="./imagenes/materi.png" alt="" />
                </div>

                <div class="card-text">
                    <h2>Material</h2>
                    <p>Recursos y juegos para seguir aprendiendo</p>
                </div>

                <div class="arrow">›</div>
            </div>
        </div>

        <!-- FOOTER -->

        <div class="footer-card">
            <img src="./imagenes/robotcoraz.png" class="robot-footer" alt="" />

            <div class="footer-text">
                <h3>¡Cada paso cuenta!</h3>
                <p>Sigue aprendiendo y sé tu mejor versión</p>
            </div>

            <img src="./imagenes/estrelli.png" class="star-footer" alt="" />
        </div>
    </div>
</body>

</html>
